<!DOCTYPE html>
<!-- saved from url=(0046)file:///C:/Users/allmo/Downloads/svadanie.html -->
<html lang="ru"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💌 Приглашение</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100vh; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #fff0f5 0%, #fff8f0 100%);
  min-height: 100vh;
  overflow-x: hidden;
}
.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: 100vh;
  padding: 2rem;
  width: 100%;
}
.screen.active { display: flex; }
.hearts { font-size: 44px; margin-bottom: 1.2rem; }
h1 { font-size: 26px; font-weight: 700; color: #2d1a24; margin-bottom: 1rem; line-height: 1.4; }
.subtitle { font-size: 16px; color: #9e7080; margin-bottom: 2.5rem; }

.btn-yes {
  background: linear-gradient(135deg, #e8547a, #c0395f);
  color: #fff; border: none; border-radius: 50px;
  font-size: 18px; font-weight: 600; padding: 16px 52px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(192,57,95,0.4);
  display: block; margin: 0 auto;
  -webkit-appearance: none;
}

#btnNo {
  background: #fff; color: #aaa;
  border: 1.5px solid #ddd; border-radius: 50px;
  font-size: 15px; padding: 12px 28px;
  cursor: pointer;
  position: fixed; z-index: 999;
  -webkit-appearance: none;
}

.datetime-row {
  display: flex; gap: 16px; flex-wrap: wrap;
  justify-content: center; width: 100%; max-width: 700px; margin-bottom: 1.5rem;
}
.card {
  background: #fff; border-radius: 20px; padding: 1.25rem;
  box-shadow: 0 4px 24px rgba(200,100,130,0.1);
  flex: 1; min-width: 280px; max-width: 340px;
}
.card-title { font-size: 14px; font-weight: 600; color: #2d1a24; margin-bottom: 12px; }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-nav {
  background: #f9f0f4; border: none; cursor: pointer;
  color: #c0395f; padding: 6px 12px; border-radius: 50px;
  font-size: 18px; font-weight: 700;
  -webkit-appearance: none;
}
.cal-month { font-size: 14px; font-weight: 600; color: #2d1a24; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-day-name { font-size: 10px; color: #bba0a8; text-align: center; padding: 3px 0; font-weight: 600; }
.cal-day {
  font-size: 12px; color: #2d1a24; text-align: center;
  padding: 7px 0; border-radius: 50%; cursor: pointer;
}
.cal-day.selected { background: #e8547a; color: #fff; font-weight: 700; }
.cal-day.past { color: #ccc; pointer-events: none; }
.cal-day.empty { pointer-events: none; }
.time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.time-btn {
  background: #fff5f8; border: 1.5px solid #f0c0d0;
  border-radius: 10px; padding: 9px 2px;
  font-size: 13px; font-weight: 500; color: #2d1a24;
  cursor: pointer; text-align: center;
  -webkit-appearance: none;
}
.time-btn.selected { background: #e8547a; color: #fff; border-color: #e8547a; }
.chosen-info { display: none; margin-top: 1.5rem; width: 100%; max-width: 400px; }
.chosen-summary { font-size: 15px; color: #9e7080; margin-bottom: 1rem; }
.prefs-label { font-size: 14px; color: #bba0a8; margin-bottom: 0.75rem; }
.prefs-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.pref-btn {
  background: #fff; border: 1.5px solid #f0c0d0; border-radius: 16px;
  padding: 16px 12px; cursor: pointer; font-size: 13px; color: #2d1a24;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  width: 115px; font-weight: 500; line-height: 1.3;
  -webkit-appearance: none;
}
.pref-icon { font-size: 28px; }
.finish-icon { font-size: 64px; margin-bottom: 1rem; }
.finish-title { font-size: 24px; font-weight: 700; color: #2d1a24; margin-bottom: 0.75rem; }
.finish-sub { font-size: 15px; color: #9e7080; line-height: 1.7; max-width: 280px; }
.badge {
  font-size: 14px; color: #c0395f; background: #fff0f5; border-radius: 50px;
  padding: 8px 20px; display: inline-block; margin-top: 1.5rem;
  border: 1px solid #f0c0d0; font-weight: 500;
}
</style>
</head>
<body>

<div id="screen1" class="screen active">
  <div class="hearts">💕</div>
  <h1>Ты пойдёшь со мной<br>на свидание?</h1>
  <p class="subtitle">Я очень надеюсь на твой ответ 🥺</p>
  <button class="btn-yes" onclick="goYes()">Да 💖</button>
</div>

<button id="btnNo" onclick="moveNo()" style="left: 2035px; top: 735px;">Нет</button>

<div id="screen2" class="screen">
  <div class="hearts">🎉</div>
  <h1>Ура! Ты согласилась! 🥰</h1>
  <p class="subtitle">Когда ты свободна?</p>
  <div class="datetime-row">
    <div class="card">
      <div class="card-title">📅 Выбери дату</div>
      <div class="cal-header">
        <button class="cal-nav" onclick="prevMonth()">‹</button>
        <span class="cal-month" id="calMonthLabel"></span>
        <button class="cal-nav" onclick="nextMonth()">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="card">
      <div class="card-title">🕐 Выбери время</div>
      <div class="time-grid" id="timeGrid"></div>
    </div>
  </div>
  <div class="chosen-info" id="chosenInfo">
    <div class="chosen-summary">📅 <strong id="chosenDateLabel"></strong> &nbsp;🕐 <strong id="chosenTimeLabel"></strong></div>
    <div class="prefs-label">Что тебе больше нравится?</div>
    <div class="prefs-row">
      <button class="pref-btn" onclick="choosePref(&#39;Выставки / музеи&#39;)"><span class="pref-icon">🏛️</span>Выставки / музеи</button>
      <button class="pref-btn" onclick="choosePref(&#39;Кофе / рестораны&#39;)"><span class="pref-icon">☕</span>Кофе / рестораны</button>
      <button class="pref-btn" onclick="choosePref(&#39;На твой выбор&#39;)"><span class="pref-icon">✨</span>На твой выбор</button>
    </div>
  </div>
</div>

<div id="screen3" class="screen">
  <div class="finish-icon">💌</div>
  <div class="finish-title">Спасибо за ответ!</div>
  <div class="finish-sub">Ожидай приглашение — я всё организую и напишу совсем скоро 🌹</div>
  <div class="badge" id="sendBadge">Отправляю...</div>
</div>

<script>
var MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
var DAYS = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
var calYear, calMonth, selectedDate = null, selectedTime = null;

// Позиция кнопки Нет
var btnNo = document.getElementById('btnNo');
var vw = window.innerWidth, vh = window.innerHeight;
btnNo.style.left = Math.round(vw * 0.6) + 'px';
btnNo.style.top = Math.round(vh * 0.55) + 'px';

function moveNo() {
  var vw = window.innerWidth, vh = window.innerHeight;
  var w = btnNo.offsetWidth || 80, h = btnNo.offsetHeight || 44;
  var curX = parseFloat(btnNo.style.left) || 0;
  var curY = parseFloat(btnNo.style.top) || 0;
  var x, y, n = 0;
  do {
    x = 10 + Math.random() * (vw - w - 20);
    y = 10 + Math.random() * (vh - h - 20);
    n++;
  } while (n < 20 && Math.abs(x-curX) < 80 && Math.abs(y-curY) < 80);
  btnNo.style.left = x + 'px';
  btnNo.style.top = y + 'px';
}

// На компьютере убегает при наведении
btnNo.onmouseenter = function() { moveNo(); };

function goYes() {
  document.getElementById('btnNo').style.display = 'none';
  showScreen('screen2');
  var now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
  renderCal();
  renderTime();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function renderCal() {
  document.getElementById('calMonthLabel').textContent = MONTHS[calMonth] + ' ' + calYear;
  var grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  DAYS.forEach(function(d) {
    var el = document.createElement('div');
    el.className = 'cal-day-name'; el.textContent = d; grid.appendChild(el);
  });
  var startDow = new Date(calYear, calMonth, 1).getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  for (var i = 0; i < startDow; i++) {
    var e = document.createElement('div'); e.className = 'cal-day empty'; grid.appendChild(e);
  }
  var dim = new Date(calYear, calMonth + 1, 0).getDate();
  var today = new Date(); today.setHours(0,0,0,0);
  for (var d = 1; d <= dim; d++) {
    var el = document.createElement('div');
    el.className = 'cal-day'; el.textContent = d;
    var td = new Date(calYear, calMonth, d);
    if (td < today) {
      el.classList.add('past');
    } else {
      if (selectedDate && selectedDate.getTime() === td.getTime()) el.classList.add('selected');
      el.setAttribute('onclick', 'pickDay(' + d + ')');
    }
    grid.appendChild(el);
  }
}

function pickDay(d) {
  selectedDate = new Date(calYear, calMonth, d);
  renderCal();
  document.getElementById('chosenDateLabel').textContent = d + ' ' + MONTHS[calMonth] + ' ' + calYear;
  checkPrefs();
}

function prevMonth() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCal(); }
function nextMonth() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCal(); }

function renderTime() {
  var times = ['10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00'];
  var grid = document.getElementById('timeGrid');
  grid.innerHTML = '';
  times.forEach(function(t) {
    var btn = document.createElement('button');
    btn.className = 'time-btn' + (selectedTime === t ? ' selected' : '');
    btn.textContent = t;
    btn.setAttribute('onclick', 'pickTime("' + t + '")');
    grid.appendChild(btn);
  });
}

function pickTime(t) {
  selectedTime = t;
  renderTime();
  document.getElementById('chosenTimeLabel').textContent = t;
  checkPrefs();
}

function checkPrefs() {
  if (selectedDate && selectedTime) {
    var info = document.getElementById('chosenInfo');
    info.style.display = 'block';
    setTimeout(function() { info.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100);
  }
}

function choosePref(pref) {
  var dateStr = selectedDate
    ? selectedDate.toLocaleDateString('ru-RU', {day:'numeric', month:'long', year:'numeric'})
    : 'не выбрана';
  showScreen('screen3');

  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
  s.onload = function() {
    emailjs.init('a3KawCouv6zDwrwGh');
    emailjs.send('service_3hda9on', 'template_82gndj3', {
      to_email: 'alimbekmaremukov2@gmail.com',
      subject: '🌹 Ответ на приглашение',
      name: 'Она согласилась! 🎉',
      message: 'Дата: ' + dateStr + '\nВремя: ' + (selectedTime||'—') + '\nПредпочтение: ' + pref
    }).then(function() {
      document.getElementById('sendBadge').textContent = '✓ Письмо отправлено!';
    }, function() {
      document.getElementById('sendBadge').textContent = '⚠️ Ошибка отправки';
    });
  };
  document.head.appendChild(s);
}
</script>


</body></html>
